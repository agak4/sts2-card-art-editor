<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>사이트 이전 안내</title>
    <script>
        const newDomain = "https://sts2-card-art-editor.pages.dev";

        const currentPath = window.location.pathname;
        const currentQuery = window.location.search;

        window.location.replace(newDomain + currentPath + currentQuery);
    </script>
</head>

<body>
    <p>사이트가 더 빠르고 안정적인 서버로 이전되었습니다.</p>
    <p>자동으로 이동되지 않는다면 <a id="manual-link" href="#">여기</a>를 클릭해 주세요.</p>
    <script>
        document.getElementById('manual-link').href = newDomain + window.location.pathname + window.location.search;
    </script>
</body>

</html>

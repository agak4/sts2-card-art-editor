<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StS2 Card Art Editor</title>
    <meta name="description" content="Slay the Spire 2 카드 이미지 아트팩 편집기">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M9.937 15.5A2 2 0 0 0 8.5 14.063L2 12l6.5-2.063A2 2 0 0 0 9.937 8.5L12 2l2.063 6.5A2 2 0 0 0 15.5 9.937L22 12l-6.5 2.063a2 2 0 0 0-1.437 1.437L12 22l-2.063-6.5Z'/%3E%3Cpath d='M20 3v4'/%3E%3Cpath d='M22 5h-4'/%3E%3Cpath d='M4 17v4'/%3E%3Cpath d='M2 19h4'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { parseGIF, decompressFrames } from 'https://cdn.jsdelivr.net/npm/gifuct-js@2.1.2/+esm';

        window.parseGIF = parseGIF;
        window.decompressFrames = decompressFrames;
    </script>
</head>

<body class="theme-dark">

    <main class="app-main">
        <input type="file" id="fileInput" accept=".json" hidden>

        <!-- 에디터 섹션 -->
        <section id="editorSection" class="editor-section">

            <!-- 좌측 고정 필터 사이드바 -->
            <aside class="filter-sidebar" id="filterRail">

                <div class="logo">
                    <div class="logo-text">
                        <i data-lucide="sparkles" class="logo-icon"></i>
                        <h1>StS2 <span>Card Art Editor</span></h1>
                    </div>
                    <a href="https://www.nexusmods.com/slaythespire2/mods/293" target="_blank" class="nexus-link"
                        title="Visit Nexus Mods">
                        <img src="https://www.nexusmods.com/favicon.ico" alt="Nexus Mods Favicon">
                    </a>
                </div>

                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="카드 검색...">
                </div>

                <!-- 캐릭터 필터 -->
                <div class="filter-group character-group">
                    <p class="filter-group-label">캐릭터</p>
                    <div class="chip-list" data-filter-group="character">
                        <button class="filter-chip active" data-filter-value="Ironclad">아이언클래드</button>
                        <button class="filter-chip" data-filter-value="Silent">사일런트</button>
                        <button class="filter-chip" data-filter-value="Regent">리젠트</button>
                        <button class="filter-chip" data-filter-value="Necrobinder">네크로바인더</button>
                        <button class="filter-chip" data-filter-value="Defect">디펙트</button>
                        <button class="filter-chip" data-filter-value="Colorless">무색</button>
                        <button class="filter-chip" data-filter-value="Ancient">고대의 존재</button>
                        <button class="filter-chip" data-filter-value="special">기타</button>
                    </div>
                </div>

                <!-- 타입 필터 -->
                <div class="filter-group type-group">
                    <p class="filter-group-label">타입</p>
                    <div class="chip-list" data-filter-group="type">
                        <button class="filter-chip active" data-filter-value="all">전체</button>
                        <button class="filter-chip" data-filter-value="Attack">공격</button>
                        <button class="filter-chip" data-filter-value="Skill">스킬</button>
                        <button class="filter-chip" data-filter-value="Power">파워</button>
                        <button class="filter-chip" data-filter-value="special">기타</button>
                    </div>
                </div>

                <!-- 희귀도 필터 -->
                <div class="filter-group rarity-group">
                    <p class="filter-group-label">희귀도</p>
                    <div class="chip-list" data-filter-group="rarity">
                        <button class="filter-chip active" data-filter-value="all">전체</button>
                        <button class="filter-chip" data-filter-value="Common">일반</button>
                        <button class="filter-chip" data-filter-value="Uncommon">고급</button>
                        <button class="filter-chip" data-filter-value="Rare">희귀</button>
                        <button class="filter-chip" data-filter-value="special">기타</button>
                    </div>
                </div>

                <div class="stats">
                    수정된 카드: <span id="cardCount">0</span>개
                </div>

                <div class="sidebar-actions">
                    <button id="importBtn" class="btn btn-primary btn-full">
                        <i data-lucide="upload"></i> 아트팩 불러오기
                    </button>
                    <button id="unloadBtn" class="btn btn-danger btn-full" disabled>
                        <i data-lucide="trash-2"></i> 아트팩 해제
                    </button>
                    <button id="exportBtn" class="btn btn-secondary btn-full" disabled>
                        <i data-lucide="download"></i> 전체 내보내기 (.json)
                    </button>
                    <button id="selectModeBtn" class="btn btn-secondary btn-full" disabled>
                        <i data-lucide="check-square"></i> 선택해서 내보내기 (.json)
                    </button>
                </div>

            </aside>

            <!-- 콘텐츠 레이아웃 (그리드 + 스크롤바) -->
            <div class="content-wrapper">
                <div class="content-area" id="contentArea">
                    <!-- 전체 로딩 레이어 -->
                    <div id="appLoading" class="app-loading hidden">
                        <div class="loader-content">
                            <div class="skeleton-loader"></div>
                            <p id="loadingText">에셋 로딩 중...</p>
                        </div>
                    </div>

                    <div class="grid-wrapper">
                        <div id="cardGrid" class="card-grid"></div>
                    </div>
                </div>

                <!-- 스크롤바 -->
                <div class="custom-scrollbar" id="customScrollbar">
                    <div class="scrollbar-track"></div>
                    <div class="scrollbar-thumb" id="scrollbarThumb"></div>
                </div>
            </div>

        </section>
    </main>

    <!-- 카드 편집 모달 -->
    <div id="editModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-body">
                <div class="card-large-preview" id="cardLargePreview">
                    <div class="sts2-card">
                        <img id="modalLayerBg" class="layer layer-bg">
                        <img id="modalLayerFrame" class="layer layer-frame">
                        <img id="modalLayerBanner" class="layer layer-banner">
                        <img id="modalLayerType" class="layer layer-type">
                        <img id="modalLayerOrb" class="layer layer-orb">
                        <div class="layer layer-art">
                            <img id="modalPreviewOriginal" class="hidden" decoding="async"
                                style="position:absolute;width:100%;height:100%;object-fit:cover;">
                            <img id="modalPreviewAnimated" class="hidden"
                                style="position:absolute;transform-origin:center;display:block;">
                            <canvas id="modalPreview"
                                style="position:absolute;width:100%;height:100%;object-fit:cover;"></canvas>
                        </div>
                        <div class="layer layer-text">
                            <div id="modalTextName" class="card-name-overlay"></div>
                        </div>
                        <div class="layer layer-text">
                            <div id="modalTextType" class="card-type-overlay"></div>
                        </div>
                    </div>
                </div>
                <div class="card-info">
                    <div class="modal-header">
                        <div>
                            <h3>카드 이미지 수정</h3>
                            <p id="modalNameKr" class="modal-card-name"></p>
                        </div>
                        <button class="btn-close" id="closeModal"><i data-lucide="x"></i></button>
                    </div>

                    <div class="info-group">
                        <div class="info-group-text">
                            <label>이미지 규격</label>
                            <div id="modalSize" class="size-display">1000 × 760</div>
                        </div>
                        <div class="image-toggle" id="toggleOriginalBtn" title="커스텀/원본 이미지 전환">
                            <div class="toggle-slider"></div>
                            <div class="toggle-option left active" data-type="custom">커스텀</div>
                            <div class="toggle-option right" data-type="original">원본</div>
                        </div>
                    </div>

                    <div class="action-group">
                        <input type="file" id="imageInput" accept="image/*" hidden>
                        <div class="button-group">
                            <button class="btn btn-primary" id="uploadImageBtn">
                                <i data-lucide="image-plus"></i> 새 이미지 업로드
                            </button>
                            <button class="btn btn-secondary" id="downloadImageBtn" title="현재 편집된 이미지 다운로드">
                                <i data-lucide="download"></i> 이미지 다운로드
                            </button>
                        </div>

                        <button id="resetCardBtn" class="btn btn-danger btn-full">
                            <i data-lucide="rotate-ccw"></i> 커스텀 이미지 제거
                        </button>
                    </div>

                    <div class="adjustment-group">
                        <div class="adjustment-header">
                            <h4>이미지 미세 조정</h4>
                            <button id="resetAdjustBtn" class="btn btn-ghost btn-sm">초기화</button>
                        </div>
                        <div class="slider-row">
                            <span id="zoomVal" data-value="100%">확대</span>
                            <input type="range" id="zoomSlider" min="10" max="300" value="100">
                        </div>
                        <div class="slider-row">
                            <span id="offsetXVal" data-value="0">좌우 이동</span>
                            <input type="range" id="offsetXSlider" min="-100" max="100" value="0">
                        </div>
                        <div class="slider-row">
                            <span id="offsetYVal" data-value="0">상하 이동</span>
                            <input type="range" id="offsetYSlider" min="-100" max="100" value="0">
                        </div>
                    </div>

                    <div class="adjustment-group">
                        <div class="adjustment-header">
                            <h4>배경색 선택 (투명 이미지용)</h4>
                        </div>
                        <div class="color-palette-container">
                            <div class="palette-row">
                                <button class="color-chip transparent active" data-color="transparent"
                                    title="투명"></button>
                                <button class="color-chip" data-color="#000000" style="background:#000000;"
                                    title="검정"></button>
                                <button class="color-chip" data-color="#ffffff" style="background:#ffffff;"
                                    title="하양"></button>
                                <button class="color-chip" data-color="#2a2a2a" style="background:#2a2a2a;"
                                    title="어두운 회색"></button>
                                <button class="color-chip" data-color="#4a4a4a" style="background:#4a4a4a;"
                                    title="회색"></button>
                                <input type="color" id="bgColorPicker" class="color-picker-input" value="#000000"
                                    title="색상 직접 선택">
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-primary" id="saveEdit">저장 및 적용</button>
                        <button class="btn btn-secondary" id="cancelEdit">취소</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 선택 모드 리모콘 -->
    <div id="selectionRemote" class="selection-remote hidden">
        <div class="remote-content">
            <span class="remote-info">선택된 카드: <strong id="selectedCount">0</strong>개</span>
            <div class="remote-actions">
                <button id="cancelSelectBtn" class="btn btn-danger">
                    <i data-lucide="x-circle"></i> 선택 취소
                </button>
                <button id="selectAllBtn" class="btn btn-secondary">
                    <i data-lucide="check-square"></i> 현재 목록 전체 선택
                </button>
                <button id="exportSelectedBtn" class="btn btn-primary" disabled>
                    <i data-lucide="download"></i> 선택 항목 내보내기
                </button>
            </div>
        </div>
    </div>

    <!-- 아트팩 불러오기 확인 모달 -->
    <div id="importChoiceModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-container mini-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="header-with-icon">
                        <i data-lucide="alert-triangle" class="text-gold"></i>
                        <h3>기존 작업 내용 감지됨</h3>
                    </div>
                </div>
                <div class="modal-body">
                    <p>이미 수정된 카드들이 있습니다. 새로운 아트팩을 어떻게 불러올까요?</p>
                </div>
                <div class="modal-footer vertical-stack">
                    <button id="importMergeBtn" class="btn btn-primary btn-full">
                        <i data-lucide="copy-plus"></i> 기존 작업에 덮어씌우기
                    </button>
                    <button id="importResetBtn" class="btn btn-danger btn-full">
                        <i data-lucide="refresh-cw"></i> 작업 초기화 후 불러오기
                    </button>
                    <button id="cancelImportBtn" class="btn btn-secondary btn-full">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>

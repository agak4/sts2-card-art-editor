<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STS2 Card Art Editor</title>
    <meta name="description" content="Slay the Spire 2 카드 이미지 아트팩 편집기">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Roboto+Mono&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="theme-dark">

    <!-- 헤더 -->
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <i data-lucide="sparkles" class="logo-icon"></i>
                <h1>STS2 <span>Card Art Editor</span></h1>
            </div>
            <nav class="header-nav">
                <button id="importBtn" class="btn btn-primary">
                    <i data-lucide="upload"></i> 아트팩 불러오기
                </button>
                <button id="addCardBtn" class="btn btn-secondary" disabled>
                    <i data-lucide="plus"></i> 카드 추가
                </button>
                <button id="exportBtn" class="btn btn-secondary" disabled>
                    <i data-lucide="download"></i> 내보내기 (.json)
                </button>
            </nav>
        </div>
    </header>

    <main class="app-main">
        <input type="file" id="fileInput" accept=".json" hidden>

        <!-- 에디터 섹션 -->
        <section id="editorSection" class="editor-section">

            <div class="toolbar">
                <div class="filter-rail" id="filterRail">

                    <!-- 캐릭터 필터 -->
                    <div class="filter-group character-group">
                        <p class="filter-group-label">캐릭터</p>
                        <div class="chip-list" data-filter-group="character">
                            <button class="filter-chip active" data-filter-value="all">전체</button>
                            <button class="filter-chip" data-filter-value="Ironclad">
                                <img src="source/img/card_frame/273px-StS2_CardIroncladOrb.png" alt=""> 아이언클래드
                            </button>
                            <button class="filter-chip" data-filter-value="Silent">
                                <img src="source/img/card_frame/273px-StS2_CardSilentOrb.png" alt=""> 사일런트
                            </button>
                            <button class="filter-chip" data-filter-value="Regent">
                                <img src="source/img/card_frame/273px-StS2_CardRegentOrb.png" alt=""> 리젠트
                            </button>
                            <button class="filter-chip" data-filter-value="Necrobinder">
                                <img src="source/img/card_frame/273px-StS2_CardNecrobinderOrb.png" alt=""> 네크로바인더
                            </button>
                            <button class="filter-chip" data-filter-value="Defect">
                                <img src="source/img/card_frame/273px-StS2_CardDefectOrb.png" alt=""> 디펙트
                            </button>
                            <button class="filter-chip" data-filter-value="Colorless">
                                <img src="source/img/card_frame/273px-StS2_CardColorlessOrb.png" alt=""> 무색
                            </button>
                            <button class="filter-chip" data-filter-value="Ancient">고대의 존재</button>
                            <button class="filter-chip" data-filter-value="misc">기타</button>
                        </div>
                    </div>

                    <!-- 타입 필터 -->
                    <div class="filter-group type-group">
                        <p class="filter-group-label">타입</p>
                        <div class="chip-list" data-filter-group="type">
                            <button class="filter-chip active" data-filter-value="all">전체</button>
                            <button class="filter-chip" data-filter-value="Attack">공격</button>
                            <button class="filter-chip" data-filter-value="Skill">스킬</button>
                            <button class="filter-chip" data-filter-value="Power">파워</button>
                            <button class="filter-chip" data-filter-value="misc">기타</button>
                        </div>
                    </div>

                    <!-- 희귀도 필터 -->
                    <div class="filter-group rarity-group">
                        <p class="filter-group-label">희귀도</p>
                        <div class="chip-list" data-filter-group="rarity">
                            <button class="filter-chip active" data-filter-value="all">전체</button>
                            <button class="filter-chip" data-filter-value="Common">일반</button>
                            <button class="filter-chip" data-filter-value="Uncommon">고급</button>
                            <button class="filter-chip" data-filter-value="Rare">희귀</button>
                            <button class="filter-chip" data-filter-value="misc">기타</button>
                        </div>
                    </div>

                </div>

                <div class="toolbar-bottom">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="카드 이름 또는 경로로 검색...">
                    </div>
                    <div class="stats">
                        수정된 카드: <span id="cardCount">0</span>개
                    </div>
                </div>
            </div>

            <div class="grid-wrapper">
                <div id="cardGrid" class="card-grid"></div>

                <!-- 전체 로딩 레이어 -->
                <div id="appLoading" class="app-loading hidden">
                    <div class="loader-content">
                        <div class="skeleton-loader"></div>
                        <p>에셋 로딩 중...</p>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <!-- 카드 편집 모달 -->
    <div id="editModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-header">
                <div>
                    <h3>카드 이미지 수정</h3>
                    <p id="modalNameKr" class="modal-card-name"></p>
                </div>
                <button class="btn-close" id="closeModal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="card-large-preview" id="cardLargePreview">
                </div>
                <div class="card-info">
                    <div class="info-group">
                        <label>원본 경로</label>
                        <div id="modalPath" class="path-display">res://images/...</div>
                    </div>
                    <div class="info-group">
                        <label>이미지 규격</label>
                        <div id="modalSize" class="size-display">1000 × 760</div>
                    </div>
                    <div class="action-group">
                        <input type="file" id="imageInput" accept="image/*" hidden>
                        <button class="btn btn-primary btn-full" id="uploadImageBtn">
                            <i data-lucide="image-plus"></i> 새 이미지 업로드
                        </button>
                        <button class="btn btn-secondary btn-full" id="toggleOriginalBtn">
                            <i data-lucide="eye"></i> 원본(Original) 대상 보기
                        </button>
                        <button id="resetCardBtn" class="btn btn-danger btn-full">
                            <i data-lucide="rotate-ccw"></i> 커스텀 이미지 제거
                        </button>
                    </div>
                    <div class="adjustment-group">
                        <h4>이미지 미세 조정 (미리보기)</h4>
                        <div class="slider-row">
                            <span>줌</span>
                            <input type="range" id="zoomSlider" min="100" max="300" value="100">
                        </div>
                        <div class="slider-row">
                            <span>X 이동</span>
                            <input type="range" id="offsetXSlider" min="-100" max="100" value="0">
                        </div>
                        <div class="slider-row">
                            <span>Y 이동</span>
                            <input type="range" id="offsetYSlider" min="-100" max="100" value="0">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelEdit">취소</button>
                <button class="btn btn-primary" id="saveEdit">저장 및 적용</button>
            </div>
        </div>
    </div>



    <script src="cards.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STS2 Card Art Editor</title>
    <meta name="description" content="Slay the Spire 2 카드 이미지 아트팩 편집기">

    <!-- Google Fonts 프리커넥트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="theme-dark">

    <main class="app-main">
        <input type="file" id="fileInput" accept=".json" hidden>

        <!-- 에디터 섹션 -->
        <section id="editorSection" class="editor-section">

            <!-- 좌측 고정 필터 사이드바 -->
            <aside class="filter-sidebar" id="filterRail">

                <div class="logo">
                    <i data-lucide="sparkles" class="logo-icon"></i>
                    <h1>STS2 <span>Card Art Editor</span></h1>
                </div>

                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="카드 검색...">
                </div>

                <!-- 캐릭터 필터 -->
                <div class="filter-group character-group">
                    <p class="filter-group-label">캐릭터</p>
                    <div class="chip-list" data-filter-group="character">
                        <button class="filter-chip active" data-filter-value="all">전체</button>
                        <button class="filter-chip" data-filter-value="Ironclad">아이언클래드</button>
                        <button class="filter-chip" data-filter-value="Silent">사일런트</button>
                        <button class="filter-chip" data-filter-value="Regent">리젠트</button>
                        <button class="filter-chip" data-filter-value="Necrobinder">네크로바인더</button>
                        <button class="filter-chip" data-filter-value="Defect">디펙트</button>
                        <button class="filter-chip" data-filter-value="Colorless">무색</button>
                        <button class="filter-chip" data-filter-value="Ancient">고대의 존재</button>
                        <button class="filter-chip" data-filter-value="special">기타</button>
                    </div>
                </div>

                <!-- 타입 필터 -->
                <div class="filter-group type-group">
                    <p class="filter-group-label">타입</p>
                    <div class="chip-list" data-filter-group="type">
                        <button class="filter-chip active" data-filter-value="all">전체</button>
                        <button class="filter-chip" data-filter-value="Attack">공격</button>
                        <button class="filter-chip" data-filter-value="Skill">스킬</button>
                        <button class="filter-chip" data-filter-value="Power">파워</button>
                        <button class="filter-chip" data-filter-value="special">기타</button>
                    </div>
                </div>

                <!-- 희귀도 필터 -->
                <div class="filter-group rarity-group">
                    <p class="filter-group-label">희귀도</p>
                    <div class="chip-list" data-filter-group="rarity">
                        <button class="filter-chip active" data-filter-value="all">전체</button>
                        <button class="filter-chip" data-filter-value="Common">일반</button>
                        <button class="filter-chip" data-filter-value="Uncommon">고급</button>
                        <button class="filter-chip" data-filter-value="Rare">희귀</button>
                        <button class="filter-chip" data-filter-value="special">기타</button>
                    </div>
                </div>

                <div class="stats">
                    수정된 카드: <span id="cardCount">0</span>개
                </div>

                <div class="sidebar-actions">
                    <button id="importBtn" class="btn btn-primary btn-full">
                        <i data-lucide="upload"></i> 아트팩 불러오기
                    </button>
                    <button id="unloadBtn" class="btn btn-danger btn-full" disabled>
                        <i data-lucide="trash-2"></i> 아트팩 해제
                    </button>
                    <button id="exportBtn" class="btn btn-secondary btn-full" disabled>
                        <i data-lucide="download"></i> 내보내기 (.json)
                    </button>
                </div>

            </aside>

            <!-- 콘텐츠 레이아웃 (그리드 + 커스텀 스크롤바) -->
            <div class="content-wrapper">
                <div class="content-area" id="contentArea">
                    <!-- 전체 로딩 레이어 -->
                    <div id="appLoading" class="app-loading hidden">
                        <div class="loader-content">
                            <div class="skeleton-loader"></div>
                            <p id="loadingText">에셋 로딩 중...</p>
                        </div>
                    </div>

                    <div class="grid-wrapper">
                        <div id="cardGrid" class="card-grid"></div>
                    </div>
                </div>

                <!-- 커스텀 스크롤바 레이어 (우측 고정됨) -->
                <div class="custom-scrollbar" id="customScrollbar">
                    <div class="scrollbar-track"></div>
                    <div class="scrollbar-thumb" id="scrollbarThumb"></div>
                </div>
            </div>

        </section>
    </main>

    <!-- 카드 편집 모달 -->
    <div id="editModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-body">
                <div class="card-large-preview" id="cardLargePreview">
                    <div class="sts2-card">
                        <img id="modalLayerBg" class="layer layer-bg">
                        <img id="modalLayerFrame" class="layer layer-frame">
                        <img id="modalLayerBanner" class="layer layer-banner">
                        <img id="modalLayerType" class="layer layer-type">
                        <img id="modalLayerOrb" class="layer layer-orb">
                        <div class="layer layer-art">
                            <img id="modalPreviewOriginal" class="hidden" decoding="async"
                                style="position:absolute;width:100%;height:100%;object-fit:cover;">
                            <canvas id="modalPreview" 
                                style="position:absolute;width:100%;height:100%;object-fit:cover;"></canvas>
                        </div>
                        <div class="layer layer-text">
                            <div id="modalTextName" class="card-name-overlay"></div>
                        </div>
                        <div class="layer layer-text">
                            <div id="modalTextType" class="card-type-overlay"></div>
                        </div>
                    </div>
                </div>
                <div class="card-info">
                    <div class="modal-header">
                        <div>
                            <h3>카드 이미지 수정</h3>
                            <p id="modalNameKr" class="modal-card-name"></p>
                        </div>
                        <button class="btn-close" id="closeModal"><i data-lucide="x"></i></button>
                    </div>

                    <div class="info-group">
                        <label>이미지 규격</label>
                        <div id="modalSize" class="size-display">1000 × 760</div>
                    </div>

                    <div class="action-group">
                        <input type="file" id="imageInput" accept="image/*" hidden>
                        <button class="btn btn-primary btn-full" id="uploadImageBtn">
                            <i data-lucide="image-plus"></i> 새 이미지 업로드
                        </button>
                        <button class="btn btn-secondary btn-full" id="toggleOriginalBtn">
                            <i data-lucide="eye"></i> 원본(Original) 대상 보기
                        </button>
                        <button id="resetCardBtn" class="btn btn-danger btn-full">
                            <i data-lucide="rotate-ccw"></i> 커스텀 이미지 제거
                        </button>
                    </div>

                    <div class="adjustment-group">
                        <div class="adjustment-header">
                            <h4>이미지 미세 조정</h4>
                            <button id="resetAdjustBtn" class="btn btn-ghost btn-sm">초기화</button>
                        </div>
                        <div class="slider-row">
                            <span id="zoomVal" data-value="100%">확대</span>
                            <input type="range" id="zoomSlider" min="100" max="300" value="100">
                        </div>
                        <div class="slider-row">
                            <span id="offsetXVal" data-value="0">좌우 이동</span>
                            <input type="range" id="offsetXSlider" min="-100" max="100" value="0">
                        </div>
                        <div class="slider-row">
                            <span id="offsetYVal" data-value="0">상하 이동</span>
                            <input type="range" id="offsetYSlider" min="-100" max="100" value="0">
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-primary" id="saveEdit">저장 및 적용</button>
                        <button class="btn btn-secondary" id="cancelEdit">취소</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
